<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42" width="100%" height="100%">
  <defs>
    <pattern id="stripes" width="10" height="10" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
      <rect width="5" height="10" fill="#d7ff42" />
    </pattern>
  </defs>
  
  <!-- Black solid shadow -->
  <rect x="5" y="5" width="34" height="34" fill="#000000" />
  
  <!-- Main border and stripes -->
  <rect x="1" y="1" width="32" height="32" fill="url(#stripes)" stroke="#d7ff42" stroke-width="2" />
</svg>
